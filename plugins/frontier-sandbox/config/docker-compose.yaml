# Frontier sandbox dependencies — PostgreSQL + SpiceDB.
#
# Two databases live inside ONE Postgres container:
#   - frontier           (Frontier app data)
#   - frontier_spicedb   (SpiceDB datastore)
#
# Frontier itself is NOT in this compose — it's built from source so you can
# iterate on code locally and just point it at these dependencies.
#
# Usage (the skill runs this for you):
#   docker compose -f plugins/frontier-sandbox/config/docker-compose.yaml \
#     -p frontier-sandbox up -d
#
# Override default ports if 5432 / 50052 are taken on the host:
#   PG_PORT=5433 SPICEDB_GRPC_PORT=50053 docker compose ... up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: frontier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: frontier
      POSTGRES_PASSWORD: frontier
      # POSTGRES_DB creates the first database. The second (frontier_spicedb)
      # is created by init-db.sql via the docker-entrypoint-initdb.d hook.
      POSTGRES_DB: frontier
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - frontier-pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontier -d frontier"]
      interval: 3s
      timeout: 3s
      retries: 20

  spicedb-migrate:
    image: authzed/spicedb:v1.34.0
    container_name: frontier-spicedb-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - migrate
      - head
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://frontier:frontier@postgres:5432/frontier_spicedb?sslmode=disable
    restart: on-failure

  spicedb:
    image: authzed/spicedb:v1.34.0
    container_name: frontier-spicedb
    restart: unless-stopped
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    command:
      - serve
      - --grpc-preshared-key=frontier
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://frontier:frontier@postgres:5432/frontier_spicedb?sslmode=disable
      - --http-enabled
      - --grpc-addr=:50051
      - --http-addr=:8443
    ports:
      - "${SPICEDB_GRPC_PORT:-50052}:50051"
      - "${SPICEDB_HTTP_PORT:-8443}:8443"

volumes:
  frontier-pgdata:
    name: frontier-sandbox-pgdata
